services:
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: dws-dashboard
    restart: unless-stopped
    environment:
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://host.docker.internal:8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:80"
